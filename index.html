<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Brief — catch what matters</title>
<meta name="description" content="Brief is coming soon. Catch what matters.">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="512x512" href="/assets/icon-512.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
<style>
  :root {
    --fg: #1a1a1a;
    --muted: #5b6470;
    --bg: #fafaf7;
    --accent: #0a2f6e;
    --border: #e2e2dc;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Helvetica, Arial, sans-serif;
    color: var(--fg);
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  main {
    max-width: 520px;
    width: 100%;
    text-align: center;
  }
  .lockup {
    display: block;
    margin: 0 auto 28px;
    width: 280px;
    max-width: 80%;
    height: auto;
  }
  h1 {
    font-size: clamp(32px, 5vw, 44px);
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 0 0 16px;
    line-height: 1.15;
  }
  p.sub {
    font-size: 17px;
    color: var(--muted);
    margin: 0 0 36px;
  }
  form {
    display: flex;
    gap: 8px;
    max-width: 420px;
    margin: 0 auto;
  }
  input[type="email"] {
    flex: 1;
    padding: 12px 14px;
    font-size: 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #fff;
    color: var(--fg);
    outline: none;
    transition: border-color 120ms ease;
    font-family: inherit;
  }
  input[type="email"]:focus {
    border-color: var(--fg);
  }
  button {
    padding: 12px 18px;
    font-size: 16px;
    font-weight: 500;
    border: 1px solid var(--accent);
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 120ms ease;
  }
  button:hover { opacity: 0.88; }
  button:disabled { opacity: 0.5; cursor: default; }
  .status {
    margin-top: 16px;
    font-size: 14px;
    min-height: 1.2em;
    color: var(--muted);
  }
  .status.success { color: #1f7a3a; }
  .status.error { color: #b3261e; }
  @media (max-width: 480px) {
    form { flex-direction: column; }
    button { width: 100%; }
  }
</style>
</head>
<body>
<main>
  <img class="lockup" src="/assets/lockup.png" alt="justbriefme — Catch what matters" width="800" height="205">
  <h1>Coming soon.</h1>
  <p class="sub">A calmer way to catch the tasks, follow-ups, and reminders hiding in your messages.</p>
  <form id="signup" novalidate>
    <input
      id="email"
      type="email"
      name="email"
      placeholder="you@example.com"
      autocomplete="email"
      required
      aria-label="Email address"
    >
    <button type="submit" id="submit">Notify me</button>
  </form>
  <div class="status" id="status" role="status" aria-live="polite"></div>
</main>
<script>
  const form = document.getElementById('signup');
  const input = document.getElementById('email');
  const button = document.getElementById('submit');
  const status = document.getElementById('status');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = input.value.trim();
    status.className = 'status';
    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      status.textContent = 'Please enter a valid email address.';
      status.classList.add('error');
      return;
    }
    button.disabled = true;
    status.textContent = 'Submitting…';
    try {
      const res = await fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      if (res.ok) {
        status.textContent = "Thanks — we'll be in touch.";
        status.classList.add('success');
        input.value = '';
      } else {
        status.textContent = 'Something went wrong. Please try again.';
        status.classList.add('error');
      }
    } catch (err) {
      status.textContent = 'Network error. Please try again.';
      status.classList.add('error');
    } finally {
      button.disabled = false;
    }
  });
</script>
</body>
</html>
