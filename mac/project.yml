name: Brief

options:
  bundleIdPrefix: app.justbriefme
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.5.0"

targets:
  Brief:
    type: application
    platform: macOS
    sources:
      - path: Brief
        excludes:
          - Generated
    info:
      path: Brief/Generated/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Brief
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "Copyright © 2026 Brief."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.justbriefme.mac
        CODE_SIGN_ENTITLEMENTS: Brief/Brief.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: Supabase
        product: Supabase
